<!DOCTYPE html>
<html>
<head>
  <title>My GA Demo Site</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E27EYTZ8SZ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-E27EYTZ8SZ', {
      debug_mode: true
    });
  </script>

</head>

<body>

<h1>My First Analytics Website</h1>
<p>Click button to send event</p>

<button onclick="sendEvent()">Click Me</button>

<script>

    event_category: 'engagement',
    event_label: 'test_button'
  });

}
</script>
